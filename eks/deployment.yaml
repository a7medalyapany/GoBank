apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-bank-api-deployment
  labels:
    app: go-bank-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-bank-api
  template:
    metadata:
      labels:
        app: go-bank-api
    spec:
      containers:
        - name: go-bank-api
          image: 201781564803.dkr.ecr.eu-central-1.amazonaws.com/go-bank:def5168f7a89e42d608cb89dbd2fea5a454e2c0a
          ports:
            - containerPort: 8080

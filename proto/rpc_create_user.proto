syntax = "proto3";

package pb;

import "user.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/a7medalyapany/GoBank.git/pb";

message CreateUserRequest {
  // Unique username. Alphanumeric only, no spaces.
  // example: "john_doe_123"
  string username = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Unique alphanumeric username. Lowercase letters, digits, and underscores only."
      min_length: 3
      max_length: 50
      pattern: "^[a-z0-9_]+$"
      example: '"john_doe_123"'
    }
  ];

  // Full display name of the user.
  // example: "John Doe"
  string full_name = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Full display name of the user."
      min_length: 2
      max_length: 100
      example: '"John Doe"'
    }
  ];

  // Valid email address. Must be unique across all accounts.
  // example: "john@example.com"
  string email = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Valid email address. Must be unique across all accounts."
      example: '"john@example.com"'
    }
  ];

  // Password for the account. Minimum 8 characters.
  // Stored as a bcrypt hash — never in plain text.
  // example: "supersecret123"
  string password = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Account password. Minimum 8 characters. Stored as bcrypt hash."
      min_length: 8
      format: "password"
      example: '"supersecret123"'
    }
  ];
}

message CreateUserResponse {
  // The newly created user (password excluded).
  User user = 1;
}

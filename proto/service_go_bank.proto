syntax = "proto3";

package pb;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "user.proto";
import "rpc_create_user.proto";
import "rpc_login_user.proto";

option go_package = "github.com/a7medalyapany/GoBank.git/pb";

// --- OpenAPI top-level spec metadata ---
// This is the single source of truth for the API name, version, and description.
// Update these fields here and run `make proto` — the docs update automatically.
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "GoBank API"
    version: "1.0.0"
    description: "A production-grade banking API built with Go, gRPC, and gRPC-Gateway.\n\nSupports user registration, authentication with access/refresh tokens (PASETO), multi-currency accounts, and atomic money transfers with deadlock-safe transactions."
    contact: {
      name: "Ahmed Alyapany"
      url: "https://github.com/a7medalyapany/GoBank"
      email: "a7medalyapany@gmail.com"
    }
    license: {
      name: "MIT"
      url: "https://opensource.org/licenses/MIT"
    }
  }
  // Servers block — overridden by runtime but useful for generated clients
  host: "localhost:8080"
  base_path: "/"
  schemes: HTTP
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
  // Reusable security definition for Bearer tokens
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Enter: **Bearer &lt;your_access_token&gt;**"
      }
    }
  }
  // Default error response shape shared across all endpoints
  responses: {
    key: "400"
    value: {
      description: "Bad Request — invalid input or missing required fields."
      schema: { json_schema: { ref: ".pb.ErrorResponse" } }
    }
  }
  responses: {
    key: "401"
    value: {
      description: "Unauthorized — missing or invalid Bearer token."
      schema: { json_schema: { ref: ".pb.ErrorResponse" } }
    }
  }
  responses: {
    key: "403"
    value: {
      description: "Forbidden — authenticated but not allowed to access this resource."
      schema: { json_schema: { ref: ".pb.ErrorResponse" } }
    }
  }
  responses: {
    key: "404"
    value: {
      description: "Not Found — the requested resource does not exist."
      schema: { json_schema: { ref: ".pb.ErrorResponse" } }
    }
  }
  responses: {
    key: "500"
    value: {
      description: "Internal Server Error — something went wrong on our end."
      schema: { json_schema: { ref: ".pb.ErrorResponse" } }
    }
  }
};

// GoBank provides user management and authentication APIs.
service GoBank {

  // CreateUser registers a new user account.
  //
  // Validates uniqueness of username and email. Password is hashed
  // with bcrypt before storage — it is never persisted in plain text.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Register a new user"
      description: "Creates a new user account. Username and email must be unique."
      tags: ["Auth"]
      operation_id: "CreateUser"
      responses: {
        key: "200"
        value: {
          description: "User created successfully."
        }
      }
      responses: {
        key: "403"
        value: {
          description: "Username or email already exists."
        }
      }
    };
  }

  // LoginUser authenticates a user and returns a PASETO access + refresh token pair.
  //
  // Access tokens are short-lived. Use the refresh token via /v1/auth/renew_access
  // to obtain a new access token without re-authenticating.
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Login and obtain tokens"
      description: "Authenticates credentials and returns a PASETO access token and a refresh token. Store the refresh token securely — it is used to renew access tokens."
      tags: ["Auth"]
      operation_id: "LoginUser"
      responses: {
        key: "200"
        value: {
          description: "Authentication successful. Returns token pair and user info."
        }
      }
      responses: {
        key: "401"
        value: {
          description: "Invalid password."
        }
      }
      responses: {
        key: "404"
        value: {
          description: "User not found."
        }
      }
    };
  }
}
